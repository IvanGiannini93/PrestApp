server:
  port: 8080

spring:
  application:
    name: prestapp-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/prestapp
    username: ${DB_USERNAME:prestapp}
    password: ${DB_PASSWORD:prestapp}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:prestapp-secret-key-change-in-production-minimum-256-bits-long}
    admin-expiration-ms: 3600000
    client-expiration-ms: 1800000
  security:
    max-failed-attempts: 5
    lock-duration-minutes: 15
